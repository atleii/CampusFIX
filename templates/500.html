{% extends "base.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center min-h-[70vh]">
    <div class="text-center px-6 py-12 max-w-lg bg-[#15151A] border border-red-900/30 rounded-2xl shadow-2xl">
        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/20">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h2 class="text-2xl font-semibold text-white mb-3">System Malfunction</h2>
        <p class="text-gray-400 mb-8 leading-relaxed text-sm">
            Our servers encountered an unexpected issue while processing your request. The technical team has been notified via the logs.
        </p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center justify-center px-6 py-3 bg-gray-800 hover:bg-gray-700 text-white font-medium rounded-lg transition-all border border-gray-700">
            Refresh Dashboard
        </a>
    </div>
</div>
{% endblock %}
