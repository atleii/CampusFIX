{% extends "base.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center min-h-[70vh]">
    <div class="text-center px-6 py-12 max-w-lg relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-[#C84C2C] opacity-10 rounded-full blur-[80px] pointer-events-none"></div>
        
        <h1 class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-700 mb-4 tracking-tighter">404</h1>
        <h2 class="text-2xl font-semibold text-white mb-3">Page Not Found</h2>
        <p class="text-gray-400 mb-8 leading-relaxed text-sm">
            The infrastructure issue you are looking for doesn't exist, or the page has been moved. Let's get you back to familiar grounds.
        </p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-[#C84C2C] hover:bg-[#A63C22] text-white font-medium rounded-lg transition-all shadow-[0_0_20px_rgba(200,76,44,0.3)]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
