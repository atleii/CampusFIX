{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-8">
    <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#C84C2C] to-orange-600 flex items-center justify-center text-white text-xl font-bold shadow-lg">
            {{ current_user.full_name[0] }}
        </div>
        <div>
            <h1 class="text-2xl font-bold text-white">Account Settings</h1>
            <p class="text-sm text-gray-400">Manage your profile and security preferences.</p>
        </div>
    </div>

    <div class="bg-[#15151A] rounded-xl border border-gray-800 overflow-hidden shadow-2xl">
        <div class="p-6 md:p-8">
            <form action="{{ url_for('profile') }}" method="POST" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Campus Email (Immutable)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <input type="email" value="{{ current_user.email }}" disabled class="w-full bg-[#0D0D12]/50 border border-gray-800 rounded-lg pl-10 pr-4 py-2.5 text-sm text-gray-500 cursor-not-allowed">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Full Name</label>
                        <input type="text" name="full_name" value="{{ current_user.full_name }}" required class="w-full bg-[#0D0D12] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#C84C2C] focus:ring-1 focus:ring-[#C84C2C] transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Department / Course</label>
                        <input type="text" name="department" value="{{ current_user.department }}" class="w-full bg-[#0D0D12] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#C84C2C] transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">System Role</label>
                        <input type="text" value="{{ current_user.role }}" disabled class="w-full bg-[#0D0D12]/50 border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed uppercase tracking-wider font-mono">
                    </div>
                </div>

                <hr class="border-gray-800 my-6">

                <div>
                    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4 text-[#C84C2C]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        Change Password
                    </h3>
                    <div class="max-w-md">
                        <label class="block text-xs font-medium text-gray-400 mb-1">New Password (leave blank to keep current)</label>
                        <input type="password" name="new_password" placeholder="••••••••" minlength="8" class="w-full bg-[#0D0D12] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#C84C2C] transition-all">
                    </div>
                </div>

                <div class="pt-4 flex justify-end">
                    <button type="submit" class="bg-[#C84C2C] hover:bg-[#A63C22] text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-all shadow-[0_0_15px_rgba(200,76,44,0.3)]">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
